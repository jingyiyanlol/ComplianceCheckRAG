name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend
  # Opt into Node 24 for GitHub-managed action runners ahead of the June 2026 forced migration
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.11.9

      - name: Ruff lint
        run: ruff check .

      - name: Run tests in Docker
        run: |
          # Tests run in Docker using the test stage of the Dockerfile
          # This ensures Python 3.11, pinned dependencies, and greenlet compatibility
          make test

  build-push:
    needs: lint-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name to lowercase
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }}

  drift-check:
    needs: build-push
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      (
        contains(github.event.head_commit.modified, 'app/rag/') ||
        contains(github.event.head_commit.modified, 'app/llm.py') ||
        contains(github.event.head_commit.modified, 'docker-compose.yml')
      )
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install drift deps
        run: pip install -r monitoring/drift_job/requirements.drift.txt

      - name: Run drift check
        run: |
          python monitoring/drift_job/run_drift.py \
            --trigger ci \
            --pipeline-version ${{ github.sha }}
