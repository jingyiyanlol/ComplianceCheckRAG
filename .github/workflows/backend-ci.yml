name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        run: pytest tests/ -v

  build-push:
    needs: lint-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  drift-check:
    needs: build-push
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      (
        contains(github.event.head_commit.modified, 'app/rag/') ||
        contains(github.event.head_commit.modified, 'app/llm.py') ||
        contains(github.event.head_commit.modified, 'docker-compose.yml')
      )
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install drift deps
        run: pip install -r monitoring/drift_job/requirements.drift.txt

      - name: Run drift check
        run: |
          python monitoring/drift_job/run_drift.py \
            --trigger ci \
            --pipeline-version ${{ github.sha }}
