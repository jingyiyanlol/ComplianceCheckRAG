services:
  ollama:
    image: ollama/ollama:0.7.0
    volumes:
      - ./volumes/ollama:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "sh", "-c", "timeout 5 bash -c '</dev/tcp/127.0.0.1/11434' && echo 'healthy' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  chromadb:
    image: chromadb/chroma:1.0.7
    volumes:
      - ./volumes/chromadb:/chroma/.chroma
    ports:
      - "8001:8000"
    environment:
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test: ["CMD", "sh", "-c", "timeout 5 bash -c '</dev/tcp/127.0.0.1/8000' && echo 'healthy' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - CHROMA_MODE=http
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./data:/app/data
      - ./llms-txt:/app/llms-txt
      - ./volumes/telemetry:/app/telemetry
    depends_on:
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v3.4.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./volumes/prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:11.6.1
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./volumes/grafana:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  pushgateway:
    image: prom/pushgateway:v1.11.1
    ports:
      - "9091:9091"

  ollama-init:
    image: curlimages/curl:latest
    entrypoint: /bin/sh
    command: -c "sleep 5 && curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"${LLM_MODEL}\"}' && curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"${EMBED_MODEL}\"}' && echo 'Models pulled successfully'"
    env_file: .env
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  drift-job:
    build:
      context: .
      dockerfile: Dockerfile.drift
    profiles: [drift]
    env_file: .env
    environment:
      - TELEMETRY_DB_PATH=/telemetry/telemetry.db
    volumes:
      - ./volumes/telemetry:/telemetry:ro
    depends_on:
      - pushgateway
